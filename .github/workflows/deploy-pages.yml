# 构建 ktv-h5 并发布到 GitHub Pages（需在仓库 Settings → Pages 将 Source 设为 GitHub Actions）
name: Deploy GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ktv-h5/package-lock.json

      - name: Install
        run: npm ci
        working-directory: ktv-h5

      - name: Build
        run: npm run build
        working-directory: ktv-h5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ktv-h5/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
